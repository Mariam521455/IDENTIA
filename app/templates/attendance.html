{% extends "base.html" %}

{% block content %}
<div class="h-[calc(100vh-120px)] flex flex-col md:flex-row gap-8 relative">

    <!-- Left: Camera Feed Section -->
    <div
        class="flex-grow glass-card relative overflow-hidden border-white/5 shadow-2xl flex flex-col items-center justify-center bg-slate-900/40">
        <!-- Status Indicator -->
        <div class="absolute top-6 left-6 z-20 flex items-center gap-2 glass-card px-4 py-2 bg-brand-dark/50">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span id="status-text" class="text-[10px] font-black uppercase tracking-[0.2em] text-white">IA Active</span>
        </div>

        <div class="absolute top-6 right-6 z-20 flex items-center gap-2">
            <button class="w-10 h-10 glass-card flex items-center justify-center hover:bg-white/10 transition-all">
                <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i>
            </button>
        </div>

        <!-- Camera Flux Simulated -->
        <div class="relative w-full max-w-2xl aspect-video mx-auto">
            <div class="absolute inset-0 flex flex-col items-center justify-center gap-6 text-slate-700">
                <i data-lucide="video" class="w-20 h-20 opacity-10"></i>
                <div class="space-y-2 text-center">
                    <p class="text-xs font-bold uppercase tracking-widest opacity-30">Scan en cours...</p>
                    <div class="flex gap-1 justify-center">
                        <div class="w-1 h-1 rounded-full bg-brand-blue animate-bounce"></div>
                        <div class="w-1 h-1 rounded-full bg-brand-blue animate-bounce [animation-delay:-0.15s]"></div>
                        <div class="w-1 h-1 rounded-full bg-brand-blue animate-bounce [animation-delay:-0.3s]"></div>
                    </div>
                </div>
            </div>

            <!-- Focus Corners -->
            <div class="absolute top-0 left-0 w-12 h-12 border-t-2 border-l-2 border-brand-blue/30 rounded-tl-3xl">
            </div>
            <div class="absolute top-0 right-0 w-12 h-12 border-t-2 border-r-2 border-brand-blue/30 rounded-tr-3xl">
            </div>
            <div class="absolute bottom-0 left-0 w-12 h-12 border-b-2 border-l-2 border-brand-blue/30 rounded-bl-3xl">
            </div>
            <div class="absolute bottom-0 right-0 w-12 h-12 border-b-2 border-r-2 border-brand-blue/30 rounded-br-3xl">
            </div>

            <!-- Smart Overlay -->
            <div id="overlay-frame" class="camera-overlay transition-all duration-300"></div>
        </div>

        <!-- Controls -->
        <div class="mt-12 flex gap-4 relative z-20">
            <button onclick="simulateRecognition('recognized')"
                class="btn-neumorph px-8 py-4 flex items-center gap-2 font-bold bg-emerald-600 shadow-emerald-500/20">
                <i data-lucide="check" class="w-5 h-5"></i>
                Simuler Succès
            </button>
            <button onclick="simulateRecognition('unknown')"
                class="px-8 py-4 rounded-2xl glass-card border border-red-500/20 font-bold text-red-400 hover:bg-red-500/10 transition-all flex items-center gap-2">
                <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                Inconnu
            </button>
        </div>
    </div>

    <!-- Right: Info Panel (Floating Blur) -->
    <div id="info-panel"
        class="w-full md:w-80 glass-card p-8 border-white/5 flex flex-col gap-8 opacity-0 translate-x-4 transition-all duration-500">
        <div class="text-center space-y-4">
            <div class="relative inline-block">
                <div class="w-32 h-32 rounded-3xl bg-brand-blue/10 border border-brand-blue/20 p-1">
                    <div
                        class="w-full h-full rounded-2xl bg-slate-800 flex items-center justify-center text-brand-blue font-black text-4xl">
                        JD
                    </div>
                </div>
                <div
                    class="absolute -bottom-2 -right-2 w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center border-4 border-brand-dark shadow-lg">
                    <i data-lucide="check" class="text-white w-5 h-5"></i>
                </div>
            </div>
            <div>
                <h3 id="student-name" class="text-2xl font-bold text-white">Jean Dupont</h3>
                <p id="student-id" class="text-xs font-bold text-brand-blue uppercase tracking-widest mt-1">26-INF-042
                </p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="p-4 bg-white/5 rounded-2xl space-y-1">
                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-tighter">Classe & Filière</p>
                <p class="text-sm font-medium text-slate-200">Licence 3 - Génie Informatique</p>
            </div>
            <div class="p-4 bg-white/5 rounded-2xl space-y-1">
                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-tighter">Heure de Passage</p>
                <p id="check-time" class="text-sm font-medium text-emerald-400">15:15:20</p>
            </div>
            <div class="p-4 bg-white/5 rounded-2xl space-y-1">
                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-tighter">Taux de Match</p>
                <p class="text-sm font-black text-white">99.8%</p>
            </div>
        </div>

        <button onclick="resetUI()"
            class="mt-auto w-full py-4 rounded-2xl border border-white/10 text-xs font-black uppercase tracking-widest hover:bg-white/5 transition-all">
            Réinitialiser
        </button>
    </div>
</div>

<script>
    function simulateRecognition(type) {
        const frame = document.getElementById('overlay-frame');
        const panel = document.getElementById('info-panel');
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        frame.className = "camera-overlay " + type;

        if (type === 'recognized') {
            dot.className = "w-2 h-2 rounded-full bg-emerald-500";
            text.textContent = "Reconnu";
            text.className = "text-[10px] font-black uppercase tracking-[0.2em] text-emerald-500";

            // Show Panel
            panel.classList.remove('opacity-0', 'translate-x-4');
            panel.classList.add('opacity-100', 'translate-x-0');

            // Set dynamic time
            document.getElementById('check-time').textContent = new Date().toLocaleTimeString('fr-FR');
        } else {
            dot.className = "w-2 h-2 rounded-full bg-red-500";
            text.textContent = "Inconnu";
            text.className = "text-[10px] font-black uppercase tracking-[0.2em] text-red-500";

            panel.classList.add('opacity-0', 'translate-x-4');
        }
    }

    function resetUI() {
        const frame = document.getElementById('overlay-frame');
        const panel = document.getElementById('info-panel');
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        frame.className = "camera-overlay";
        panel.classList.add('opacity-0', 'translate-x-4');
        dot.className = "w-2 h-2 rounded-full bg-brand-blue animate-pulse";
        text.textContent = "IA Active";
        text.className = "text-[10px] font-black uppercase tracking-[0.2em] text-white";
    }
</script>
{% endblock %}
