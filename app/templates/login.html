{% extends "base.html" %}

{% block auth_content %}
<div class="flex min-h-screen items-center justify-center p-6 bg-brand-dark relative overflow-hidden">
    <!-- Abstract background decorations -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-blue/10 rounded-full blur-[120px] -mr-64 -mt-64">
    </div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-brand-navy/20 rounded-full blur-[120px] -ml-64 -mb-64">
    </div>

    <div class="w-full max-w-md space-y-8 glass-card p-10 animate-fade-in relative z-10 border-white/10">
        <div class="text-center">
            <div
                class="mx-auto w-20 h-20 bg-brand-blue rounded-3xl flex items-center justify-center text-white shadow-2xl shadow-blue-500/20 mb-8 border border-white/20">
                <i data-lucide="scan-eye" class="w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-bold tracking-tight text-white font-display">Accès Institutionnel</h2>
            <p class="mt-2 text-sm text-slate-400">Plateforme <span class="text-brand-blue font-bold">IDENTIA</span> |
                Reconnaissance Faciale</p>
        </div>

        <form class="mt-10 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="space-y-5">
                <div class="group">
                    <label for="username"
                        class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 transition-colors group-focus-within:text-brand-blue">Identifiant</label>
                    <div class="relative">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-brand-blue transition-colors">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </div>
                        <input id="username" name="username" type="text" required
                            class="block w-full rounded-2xl border-white/5 bg-white/5 pl-11 pr-4 py-4 text-white placeholder-slate-600 focus:bg-white/10 focus:border-brand-blue/50 focus:ring-1 focus:ring-brand-blue/50 sm:text-sm transition-all outline-none"
                            placeholder="Ex: admin_01">
                    </div>
                </div>
                <div class="group">
                    <label for="password"
                        class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 transition-colors group-focus-within:text-brand-blue">Mot
                        de passe</label>
                    <div class="relative">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-brand-blue transition-colors">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                            class="block w-full rounded-2xl border-white/5 bg-white/5 pl-11 pr-4 py-4 text-white placeholder-slate-600 focus:bg-white/10 focus:border-brand-blue/50 focus:ring-1 focus:ring-brand-blue/50 sm:text-sm transition-all outline-none"
                            placeholder="••••••••">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit"
                    class="btn-neumorph group relative flex w-full justify-center items-center gap-3 px-4 py-4 text-sm font-bold text-white shadow-xl hover:shadow-blue-500/10">
                    Se connecter au système
                    <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>
        </form>

        <div class="text-center mt-10">
            <div
                class="flex items-center justify-center gap-2 text-[10px] text-slate-500 uppercase font-black tracking-[0.2em]">
                <span class="w-8 h-[1px] bg-slate-800"></span>
                Système Audité & Sécurisé
                <span class="w-8 h-[1px] bg-slate-800"></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
